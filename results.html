<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Explore — Your Itinerary</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--ink:#0f1117;--paper:#f8f5ef;--gold:#c9a84c;--gold-light:#e8d5a3;--mist:#e8e4dc;--text-secondary:#6b6560;--white:#ffffff;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);}
.nav{background:var(--ink);padding:16px 64px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:0.08em;color:var(--white);text-decoration:none;}
.logo span{color:var(--gold);}
.nav-actions{display:flex;gap:12px;align-items:center;}
.btn{padding:10px 24px;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;border:none;text-transform:uppercase;}
.btn-gold{background:var(--gold);color:var(--ink);}
.btn-gold:hover{background:var(--gold-light);}
.btn-outline{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.3);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-ghost{background:transparent;color:rgba(255,255,255,0.5);font-size:12px;padding:8px 16px;}
.btn-ghost:hover{color:var(--white);}
.hero-summary{background:var(--ink);padding:48px 64px 56px;position:relative;overflow:hidden;}
.hero-summary::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.1) 0%,transparent 70%);pointer-events:none;}
.summary-grid{display:grid;grid-template-columns:1fr auto;gap:48px;align-items:start;max-width:1100px;margin:0 auto;}
.summary-eyebrow{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;font-weight:500;}
.summary-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,48px);font-weight:300;color:var(--white);line-height:1.1;margin-bottom:8px;}
.summary-title em{font-style:italic;color:var(--gold);}
.summary-subtitle{font-size:14px;color:rgba(255,255,255,0.45);margin-bottom:24px;}
.summary-tags{display:flex;flex-wrap:wrap;gap:8px;}
.summary-tag{padding:6px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:20px;font-size:12px;color:rgba(255,255,255,0.6);display:flex;align-items:center;gap:6px;}
.summary-tag svg{color:var(--gold);}
.summary-stats{display:flex;flex-direction:column;gap:16px;min-width:180px;}
.stat-card{background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.2);border-radius:4px;padding:16px 20px;text-align:center;}
.stat-card-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--gold);line-height:1;}
.stat-card-label{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;letter-spacing:0.08em;text-transform:uppercase;}
.main{max-width:1100px;margin:0 auto;padding:40px 64px;display:grid;grid-template-columns:1fr 300px;gap:32px;align-items:start;}
.content{display:flex;flex-direction:column;gap:32px;}
.sidebar{display:flex;flex-direction:column;gap:20px;position:sticky;top:72px;}
.section-card{background:var(--white);border-radius:4px;overflow:hidden;border:1px solid var(--mist);}
.section-card-header{padding:20px 24px 16px;border-bottom:1px solid var(--mist);display:flex;align-items:center;justify-content:space-between;}
.section-card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;display:flex;align-items:center;gap:10px;}
.section-card-title svg{color:var(--gold);}
.section-card-body{padding:20px 24px;}
.flight-best{background:var(--ink);border-radius:4px;padding:20px 24px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;}
.flight-city-code{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--white);line-height:1;}
.flight-city-name{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;}
.flight-line{width:32px;height:1px;background:rgba(201,168,76,0.4);}
.flight-price-big{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--gold);font-weight:600;line-height:1;}
.flight-price-note{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;}
.flight-book-btn{padding:12px 20px;background:var(--gold);color:var(--ink);border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.2s;white-space:nowrap;}
.flight-book-btn:hover{background:var(--gold-light);}
.top5-grid{display:flex;flex-direction:column;gap:8px;}
.fare-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--paper);border-radius:2px;border:1px solid var(--mist);cursor:pointer;transition:all 0.2s;text-decoration:none;}
.fare-row:hover{border-color:var(--gold);}
.fare-row.best-fare{background:var(--ink);border-color:var(--gold);}
.fare-row.best-fare .fare-date,.fare-row.best-fare .fare-stops{color:rgba(255,255,255,0.6);}
.fare-row.best-fare .fare-price{color:var(--gold);}
.fare-row.best-fare .fare-badge{display:inline-block;}
.fare-date{font-size:13px;color:var(--text-secondary);}
.fare-airline{font-size:11px;color:var(--text-secondary);background:var(--mist);padding:2px 8px;border-radius:10px;}
.fare-stops{font-size:11px;color:var(--text-secondary);}
.fare-price{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--ink);}
.fare-badge{display:none;font-size:10px;background:var(--gold);color:var(--ink);padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:0.05em;margin-left:8px;}
.day-card{border:1px solid var(--mist);border-radius:4px;overflow:hidden;margin-bottom:12px;}
.day-card:last-child{margin-bottom:0;}
.day-header{background:var(--ink);padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
.day-header:hover{background:#1a1c24;}
.day-num-badge{width:30px;height:30px;border-radius:50%;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--gold);flex-shrink:0;}
.day-header-info{flex:1;}
.day-title{font-size:14px;font-weight:500;color:var(--white);}
.day-date{font-size:11px;color:rgba(255,255,255,0.4);margin-top:1px;}
.day-city-tag{font-size:11px;color:var(--gold);background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);padding:3px 10px;border-radius:20px;white-space:nowrap;}
.day-chevron{color:rgba(255,255,255,0.3);transition:transform 0.3s;margin-left:8px;flex-shrink:0;}
.day-card.open .day-chevron{transform:rotate(180deg);}
.day-body{display:none;}
.day-card.open .day-body{display:block;}
.time-slot{padding:16px 20px;border-bottom:1px solid var(--mist);display:flex;gap:14px;}
.time-slot:last-of-type{border-bottom:none;}
.time-label{width:80px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;}
.time-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.time-icon.morning{background:rgba(255,200,50,0.1);}
.time-icon.afternoon{background:rgba(201,168,76,0.1);}
.time-icon.evening{background:rgba(100,100,200,0.1);}
.time-tag{font-size:9px;color:var(--text-secondary);letter-spacing:0.08em;text-transform:uppercase;}
.time-content p{font-size:13px;color:var(--ink);line-height:1.75;}
.meals-row{padding:14px 20px;background:var(--paper);border-top:1px solid var(--mist);}
.meals-title{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:10px;font-weight:500;}
.meal-item{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.meal-item:last-child{margin-bottom:0;}
.meal-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);margin-top:6px;flex-shrink:0;}
.meal-text{font-size:12px;color:var(--text-secondary);line-height:1.65;}
.meal-label{color:var(--ink);font-weight:500;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;margin-right:4px;}
.day-tip{padding:12px 20px;background:rgba(201,168,76,0.04);border-top:1px solid rgba(201,168,76,0.12);font-size:12px;color:var(--text-secondary);display:flex;gap:8px;align-items:flex-start;line-height:1.65;}
.day-tip svg{color:var(--gold);flex-shrink:0;margin-top:1px;}
.hotel-card{border:1px solid var(--mist);border-radius:4px;padding:18px 20px;margin-bottom:12px;transition:border-color 0.2s;}
.hotel-card:last-child{margin-bottom:0;}
.hotel-card:hover{border-color:var(--gold);}
.hotel-icon{width:40px;height:40px;background:var(--ink);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hotel-name{font-size:15px;font-weight:500;margin-bottom:4px;}
.hotel-location{font-size:12px;color:var(--text-secondary);margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.hotel-why{font-size:12px;color:var(--text-secondary);line-height:1.65;margin-bottom:12px;}
.hotel-price{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold);}
.hotel-price-note{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text-secondary);font-weight:400;}
.hotel-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.hotel-link{padding:6px 14px;border:1px solid var(--mist);border-radius:20px;font-size:11px;color:var(--text-secondary);text-decoration:none;transition:all 0.2s;display:flex;align-items:center;gap:4px;}
.hotel-link:hover{border-color:var(--gold);color:var(--gold);}
.affiliate-section{background:var(--ink);border-radius:4px;overflow:hidden;border:1px solid rgba(201,168,76,0.15);}
.affiliate-header{padding:14px 18px 10px;border-bottom:1px solid rgba(255,255,255,0.07);}
.affiliate-header-title{font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);font-weight:500;}
.affiliate-header-desc{font-size:12px;color:rgba(255,255,255,0.4);margin-top:3px;}
.affiliate-grid{padding:10px;display:flex;flex-direction:column;gap:6px;}
.affiliate-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:2px;text-decoration:none;transition:all 0.2s;gap:12px;}
.affiliate-item:hover{border-color:rgba(201,168,76,0.3);background:rgba(201,168,76,0.05);}
.affiliate-item-name{font-size:13px;font-weight:500;color:var(--white);}
.affiliate-item-desc{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;line-height:1.4;}
.affiliate-item-arrow{color:var(--gold);flex-shrink:0;}
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.food-item{padding:12px 14px;background:var(--paper);border-radius:2px;border-left:3px solid var(--gold);font-size:13px;color:var(--text-secondary);line-height:1.5;}
.tip-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--mist);font-size:13px;color:var(--text-secondary);line-height:1.65;align-items:flex-start;}
.tip-item:last-child{border-bottom:none;}
.tip-num{width:22px;height:22px;border-radius:50%;background:var(--ink);color:var(--gold);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.budget-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--mist);gap:12px;}
.budget-row:last-child{border-bottom:none;}
.budget-label{display:flex;align-items:center;gap:8px;font-size:13px;min-width:90px;}
.budget-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.budget-bar-wrap{flex:1;height:4px;background:var(--mist);border-radius:2px;overflow:hidden;}
.budget-bar{height:100%;border-radius:2px;transition:width 1.2s ease;}
.budget-amount{font-size:13px;font-weight:500;white-space:nowrap;}
.budget-total{margin-top:14px;padding-top:14px;border-top:2px solid var(--ink);display:flex;justify-content:space-between;align-items:center;}
.budget-total-label{font-size:13px;font-weight:500;}
.budget-total-amount{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--gold);}
.sidebar-card{background:var(--white);border-radius:4px;padding:18px;border:1px solid var(--mist);}
.sidebar-title{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-secondary);font-weight:500;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--mist);}
.action-btn{width:100%;padding:13px 18px;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;border:none;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;}
.action-btn:last-child{margin-bottom:0;}
.action-btn.primary{background:var(--gold);color:var(--ink);}
.action-btn.primary:hover{background:var(--gold-light);}
.action-btn.secondary{background:var(--ink);color:var(--white);}
.action-btn.secondary:hover{background:#1a1c24;}
.action-btn.tertiary{background:transparent;color:var(--ink);border:1px solid var(--mist);}
.action-btn.tertiary:hover{border-color:var(--gold);color:var(--gold);}
.share-divider{text-align:center;font-size:11px;color:var(--text-secondary);margin:6px 0;}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:var(--white);padding:14px 24px;border-radius:4px;font-size:13px;display:flex;align-items:center;gap:10px;z-index:1000;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);border:1px solid rgba(201,168,76,0.3);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast svg{color:var(--gold);}
.error-state{text-align:center;padding:80px 32px;}
.error-state h2{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;margin-bottom:16px;}
.error-state p{color:var(--text-secondary);margin-bottom:32px;}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px;}
.spinner{width:40px;height:40px;border:3px solid var(--mist);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.lang-en .zh{display:none;}
.lang-zh .en{display:none;}
@media(max-width:900px){
.nav{padding:14px 24px;}.hero-summary{padding:28px 24px 36px;}
.summary-grid{grid-template-columns:1fr;gap:20px;}.main{grid-template-columns:1fr;padding:24px;}
.sidebar{position:static;}.food-grid{grid-template-columns:1fr;}
.flight-best{flex-direction:column;align-items:flex-start;}}
</style>
</head>
<body class="lang-en">

<nav class="nav">
  <a href="/" class="logo">Global <span>Explore</span></a>
  <div class="nav-actions">
    <button class="btn btn-ghost" onclick="window.location.href='/'">
      <span class="en">← New Plan</span><span class="zh">← 新规划</span>
    </button>
    <button class="btn btn-outline" onclick="sendEmail()">
      <span class="en">Email Me</span><span class="zh">发送到邮箱</span>
    </button>
    <button class="btn btn-gold" id="pdfBtn" onclick="downloadPDF()">
      <span class="en">Download PDF</span><span class="zh">下载PDF</span>
    </button>
  </div>
</nav>

<div id="appContent">
  <div class="loading-state">
    <div class="spinner"></div>
    <p style="color:var(--text-secondary);font-size:14px;" class="en">Loading your itinerary…</p>
    <p style="color:var(--text-secondary);font-size:14px;" class="zh">正在加载你的行程…</p>
  </div>
</div>

<div class="toast" id="toast">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastMsg"></span>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const lang = params.get('lang') || localStorage.getItem('ge_lang') || 'en';
document.body.className = 'lang-' + lang;

let itinerary = null;
let flights = null;

// Currency helpers
const CURRENCY_SYMBOLS = {
  AUD:'A$', USD:'$', GBP:'£', EUR:'€', CNY:'¥',
  SGD:'S$', JPY:'¥', HKD:'HK$', CAD:'C$', NZD:'NZ$'
};
const currency = localStorage.getItem('ge_currency') || 'AUD';
const currSym  = CURRENCY_SYMBOLS[currency] || currency;

function fmt(num) {
  if (!num && num !== 0) return '—';
  return currSym + Number(num).toLocaleString();
}

function init() {
  const raw = localStorage.getItem('ge_results');
  if (!raw) { showError(); return; }
  try {
    const data = JSON.parse(raw);
    if (data.error) { showError(); return; }
    itinerary = data.itinerary;
    flights   = data.flights;
    render();
  } catch(e) { showError(); }
}

function showError() {
  document.getElementById('appContent').innerHTML = `
    <div class="error-state">
      <h2 class="en">Something went wrong</h2>
      <h2 class="zh">出现了一些问题</h2>
      <p class="en">We couldn't load your itinerary. Please try planning again.</p>
      <p class="zh">无法加载您的行程，请重新规划。</p>
      <a href="/" style="display:inline-block;background:var(--gold);color:var(--ink);padding:14px 32px;text-decoration:none;font-weight:600;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;border-radius:2px;">
        <span class="en">Plan Again</span><span class="zh">重新规划</span>
      </a>
    </div>`;
}

function render() {
  if (!itinerary) return;
  const origin   = localStorage.getItem('ge_origin') || '';
  const dest     = localStorage.getItem('ge_dest')   || '';
  const dateFrom = localStorage.getItem('ge_dateFrom') || '';
  const dateTo   = localStorage.getItem('ge_dateTo')   || '';
  const adults   = localStorage.getItem('ge_adults')   || '1';
  const nights   = itinerary.days ? Math.max(itinerary.days.length - 1, 1) : 0;
  const aff      = itinerary.affiliateRecommendations || {};

  document.getElementById('appContent').innerHTML = `
    <div class="hero-summary">
      <div class="summary-grid">
        <div>
          <div class="summary-eyebrow en">Your Personalised Itinerary</div>
          <div class="summary-eyebrow zh">你的专属行程方案</div>
          <h1 class="summary-title en">${origin} → <em>${dest}</em></h1>
          <h1 class="summary-title zh">${origin} → <em>${dest}</em></h1>
          <p class="summary-subtitle en">${fmtRange(dateFrom,dateTo,'en')} · ${itinerary.days?.length||0} days · ${currency}</p>
          <p class="summary-subtitle zh">${fmtRange(dateFrom,dateTo,'zh')} · ${itinerary.days?.length||0} 天 · ${currency}</p>
          <div class="summary-tags">
            <div class="summary-tag">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              <span class="en">${adults} travellers</span><span class="zh">${adults} 位旅行者</span>
            </div>
            ${nights>0?`<div class="summary-tag"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="en">${nights} nights</span><span class="zh">${nights} 晚</span></div>`:''}
            ${flights?.cheapest?`<div class="summary-tag"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 2 16.5 3.5L13 7 4.8 5.2l-2 2 6.3 3.6L5 16l-1.5.4L2 18l2 .5.5 2 1.5-1.5.5-1.5 4-4.1 3.6 6.3 2-2z"/></svg><span>Best fare: ${fmt(flights.cheapest.price)}</span></div>`:''}
          </div>
          <p style="margin-top:20px;font-size:14px;color:rgba(255,255,255,0.45);line-height:1.8;">${itinerary.summary||''}</p>
        </div>
        <div class="summary-stats">
          <div class="stat-card">
            <div class="stat-card-num">${itinerary.days?.length||0}</div>
            <div class="stat-card-label en">Days Planned</div><div class="stat-card-label zh">天行程</div>
          </div>

function renderFlights(origin, dest, dateFrom, dateTo, adults) {
  if (!flights) return '';
  const top5 = flights.top5 || [];
  const best = flights.cheapest;
  if (!best && !top5.length) {
    const link = flights.searchLink || '#';
    return `<div class="section-card">
      <div class="section-card-header">
        <div class="section-card-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 2 16.5 3.5L13 7 4.8 5.2l-2 2 6.3 3.6L5 16l-1.5.4L2 18l2 .5.5 2 1.5-1.5.5-1.5 4-4.1 3.6 6.3 2-2z"/></svg>
          <span class="en">Flights</span><span class="zh">机票</span>
        </div>
      </div>
      <div class="section-card-body">
        <p style="font-size:14px;color:var(--text-secondary);margin-bottom:16px;" class="en">No cached fares found for these dates. Click below to search live prices.</p>
        <p style="font-size:14px;color:var(--text-secondary);margin-bottom:16px;" class="zh">未找到缓存票价，点击下方搜索实时价格。</p>
        <a href="${link}" target="_blank" class="flight-book-btn" style="display:inline-block;">
          <span class="en">Search Flights →</span><span class="zh">搜索航班 →</span>
        </a>
      </div>
    </div>`;
  }

  const oCode = origin.match(/\(([A-Z]{3})\)/)?.[1] || origin.slice(0,3).toUpperCase();
  const dCode = dest.match(/\(([A-Z]{3})\)/)?.[1]   || dest.slice(0,3).toUpperCase();
  const oName = origin.replace(/\s*\([A-Z]+\)/,'').trim();
  const dName = dest.replace(/\s*\([A-Z]+\)/,'').trim();

  const fareRows = top5.map((f,i) => {
    const d = new Date(f.date);
    const label = d.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'});
    return `<a class="fare-row ${i===0?'best-fare':''}" href="${f.link}" target="_blank">
      <div>
        <div class="fare-date">${label}</div>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <span class="fare-airline">${f.airline||''}</span>
          <span class="fare-stops">${f.direct?'Direct':(f.transfers||0)+' stop'} · ${f.travelClass||'Economy'}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="fare-price">${fmt(f.price)}</div>
        <div class="fare-badge">BEST</div>
      </div>
    </a>`;
  }).join('');

  return `<div class="section-card">
    <div class="section-card-header">
      <div class="section-card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 2 16.5 3.5L13 7 4.8 5.2l-2 2 6.3 3.6L5 16l-1.5.4L2 18l2 .5.5 2 1.5-1.5.5-1.5 4-4.1 3.6 6.3 2-2z"/></svg>
        <span class="en">Flights</span><span class="zh">机票</span>
      </div>
      <span style="font-size:12px;color:var(--text-secondary);" class="en">Top 5 cheapest — 30-day search · ${currency}</span>
      <span style="font-size:12px;color:var(--text-secondary);" class="zh">30天内最便宜的5个日期 · ${currency}</span>
    </div>
    <div class="section-card-body">
      ${best?`<div class="flight-best">
        <div style="display:flex;align-items:center;gap:16px;">
          <div><div class="flight-city-code">${oCode}</div><div class="flight-city-name">${oName}</div></div>
          <div style="display:flex;align-items:center;gap:6px;">
            <div class="flight-line"></div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(201,168,76,0.7)" stroke-width="1.5"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 2 16.5 3.5L13 7 4.8 5.2l-2 2 6.3 3.6L5 16l-1.5.4L2 18l2 .5.5 2 1.5-1.5.5-1.5 4-4.1 3.6 6.3 2-2z"/></svg>
            <div class="flight-line"></div>
          </div>
          <div><div class="flight-city-code">${dCode}</div><div class="flight-city-name">${dName}</div></div>
        </div>
        <div>
          <div class="flight-price-big">${fmt(best.price)}</div>
          <div class="flight-price-note">${best.direct?'Direct':'Via '+best.transfers+' stop'} · ${best.airline||''} · ${best.date} · ${best.travelClass||'Economy'}</div>
        </div>
        <a href="${best.link}" target="_blank" class="flight-book-btn">
          <span class="en">Search This Flight</span><span class="zh">搜索此航班</span>
        </a>
      </div>`:''}
      <p style="font-size:12px;color:var(--text-secondary);margin-bottom:10px;" class="en">Click any date to search — per person one-way reference fares in ${currency}:</p>
      <p style="font-size:12px;color:var(--text-secondary);margin-bottom:10px;" class="zh">点击任意日期搜索 — 单人单程参考票价（${currency}）：</p>
      <div class="top5-grid">${fareRows}</div>
      <p style="font-size:11px;color:var(--text-secondary);margin-top:10px;line-height:1.6;" class="en">Reference fares only — verify current price before booking.</p>
      <p style="font-size:11px;color:var(--text-secondary);margin-top:10px;line-height:1.6;" class="zh">仅供参考，预订前请核实当前价格。</p>
    </div>
  </div>`;
}

    {key:'accommodation', en:'Accommodation', zh:'住宿',   color:'#8b7230'},
    {key:'food',          en:'Food & Dining', zh:'餐饮',   color:'#a05a34'},

  return `<div class="sidebar-card">

    ${items.map(item=>`
      <div class="budget-row">
        <div class="budget-label">
          <div class="budget-dot" style="background:${item.color};"></div>
          <span class="en">${item.en}</span><span class="zh">${item.zh}</span>
        </div>
        <div class="budget-bar-wrap">
          <div class="budget-bar" style="background:${item.color};width:0%;" data-w="${Math.round(budget[item.key]/total*100)}%"></div>
        </div>
        <div class="budget-amount">${fmt(budget[item.key])}</div>
      </div>`).join('')}
    <div class="budget-total">
      <div><div class="budget-total-label en">Total (est.)</div><div class="budget-total-label zh">总计（参考）</div></div>
      <div class="budget-total-amount">${fmt(budget.total)}</div>
    </div>
    <p style="font-size:11px;color:var(--text-secondary);margin-top:10px;line-height:1.6;" class="en">Estimates for all travellers. Verify before booking.</p>
    <p style="font-size:11px;color:var(--text-secondary);margin-top:10px;line-height:1.6;" class="zh">所有旅行者的预估费用，预订前请核实。</p>
  </div>`;
}

function fmtRange(from, to, l) {
  if (!from||!to) return '';
  const f = new Date(from), t = new Date(to);
  return l==='zh'
    ? `${f.getMonth()+1}月${f.getDate()}日 — ${t.getMonth()+1}月${t.getDate()}日`
    : f.toLocaleDateString('en',{month:'short',day:'numeric'})+' — '+t.toLocaleDateString('en',{month:'short',day:'numeric'});
}

function toggleDay(i){const c=document.getElementById('day-'+i);if(c)c.classList.toggle('open');}
function toggleAllDays(){const all=document.querySelectorAll('.day-card');const anyOpen=Array.from(all).some(c=>c.classList.contains('open'));all.forEach(c=>anyOpen?c.classList.remove('open'):c.classList.add('open'));}
function animateBars(){document.querySelectorAll('.budget-bar[data-w]').forEach(b=>{setTimeout(()=>{b.style.width=b.dataset.w;},200);});}

function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

function sendEmail(){
  showToast(lang==='zh'?'行程已发送至您的注册邮箱':'Itinerary sent to your registered email');
}

async function downloadPDF(){
  const btn=document.getElementById('pdfBtn');
  btn.disabled=true;
  btn.innerHTML=lang==='zh'?'<span>生成中…</span>':'<span>Generating…</span>';
  document.querySelectorAll('.day-card').forEach(c=>c.classList.add('open'));
  const dest=localStorage.getItem('ge_dest')||'itinerary';
  const filename='GlobalExplore-'+dest.replace(/[^a-z0-9]/gi,'_').slice(0,30)+'.pdf';
  try {
    const {jsPDF}=window.jspdf;
    const el=document.getElementById('pdfContent');
    if(!el) throw new Error('No content');
    const canvas=await html2canvas(el,{
      scale:1.5,useCORS:true,letterRendering:true,
      backgroundColor:'#f8f5ef',windowWidth:1100,
      onclone:(doc)=>{
        doc.querySelectorAll('a').forEach(a=>{a.style.color='#c9a84c';a.style.textDecoration='underline';});
        doc.querySelectorAll('.sidebar .action-btn').forEach(el=>el.style.display='none');
      }
    });
    const imgData=canvas.toDataURL('image/jpeg',0.92);
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pageW=pdf.internal.pageSize.getWidth();
    const pageH=pdf.internal.pageSize.getHeight();
    const margin=10;
    const usableW=pageW-margin*2;
    const imgH=canvas.height*usableW/canvas.width;
    let yPos=0,page=0;
    while(yPos<imgH){
      if(page>0)pdf.addPage();
      pdf.addImage(imgData,'JPEG',margin,margin-yPos,usableW,imgH);
      yPos+=pageH-margin*2;page++;
    }
    el.querySelectorAll('a[href]').forEach(link=>{
      const rect=link.getBoundingClientRect();
      const elRect=el.getBoundingClientRect();
      const relX=(rect.left-elRect.left)/el.scrollWidth*usableW+margin;
      const relY=(rect.top-elRect.top)/el.scrollHeight*imgH;
      const linkW=rect.width/el.scrollWidth*usableW;
      const linkH=rect.height/el.scrollHeight*imgH;
      const pageNum=Math.floor(relY/(pageH-margin*2));
      const yOnPage=relY-pageNum*(pageH-margin*2)+margin;
      if(pageNum<page){pdf.setPage(pageNum+1);pdf.link(relX,yOnPage,linkW,linkH,{url:link.href});}
    });
    pdf.save(filename);
    showToast(lang==='zh'?'PDF已下载':'PDF downloaded successfully');
  } catch(err){
    console.error('PDF error:',err);
    showToast(lang==='zh'?'PDF生成失败，请重试':'PDF generation failed — please try again');
  }
  btn.disabled=false;
  btn.innerHTML=lang==='zh'?'<span class="zh">下载PDF</span>':'<span class="en">Download PDF</span>';
}

window.addEventListener('load', init);
</script>

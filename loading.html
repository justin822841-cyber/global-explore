<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Explore — Planning Your Trip</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f1117;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --white: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: var(--ink);
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 600;
    letter-spacing: 0.08em;
    position: absolute; top: 28px; left: 50%;
    transform: translateX(-50%);
  }
  .logo span { color: var(--gold); }

  /* SCENE CONTAINER */
  .scene-wrap {
    width: 640px;
    max-width: 95vw;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* CANVAS AREA */
  .canvas {
    width: 100%;
    height: 200px;
    background: #0a0e1a;
    position: relative;
    overflow: hidden;
    border-radius: 4px 4px 0 0;
    border: 1px solid rgba(201,168,76,0.15);
    border-bottom: none;
  }

  /* SKY GRADIENT */
  .sky-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #0a0e1a 0%, #0f1a35 60%, #1a2a4a 100%);
  }

  /* STARS */
  .stars {
    position: absolute;
    inset: 0;
  }

  /* GROUND */
  .ground-strip {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: #1a1c24;
  }
  /* Grass */
  .grass {
    position: absolute;
    bottom: 48px; left: 0; right: 0;
    height: 8px;
    background: #2d5a1b;
  }
  .grass::after {
    content: '';
    position: absolute;
    top: -3px; left: 0; right: 0;
    height: 4px;
    background: repeating-linear-gradient(
      90deg,
      #3a7a22 0px, #3a7a22 4px,
      transparent 4px, transparent 8px
    );
  }

  /* ROAD MARKINGS */
  .road-marks {
    position: absolute;
    bottom: 20px; left: 0; right: 0;
    height: 4px;
    overflow: hidden;
  }
  .road-mark {
    position: absolute;
    top: 0;
    width: 32px; height: 4px;
    background: rgba(201,168,76,0.25);
    animation: roadScroll 1s linear infinite;
  }

  @keyframes roadScroll {
    from { transform: translateX(700px); }
    to   { transform: translateX(-50px); }
  }

  /* HOUSES */
  .house {
    position: absolute;
    bottom: 56px;
    image-rendering: pixelated;
  }

  /* CITY BUILDINGS (right side, appear later) */
  .buildings {
    position: absolute;
    bottom: 56px;
    right: -200px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    animation: buildingsSlide 14s linear forwards;
    animation-delay: 3s;
  }
  @keyframes buildingsSlide {
    from { right: -300px; }
    to   { right: 0px; }
  }

  /* PIXEL PLANE */
  .plane {
    position: absolute;
    top: 18px;
    animation: planeFly 7s linear infinite;
  }
  @keyframes planeFly {
    from { left: -80px; }
    to   { left: calc(100% + 80px); }
  }

  /* MOON */
  .moon {
    position: absolute;
    top: 14px; right: 60px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--gold-light);
    box-shadow: 0 0 12px rgba(201,168,76,0.4);
  }
  .moon::after {
    content: '';
    position: absolute;
    top: 2px; left: 4px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #0a0e1a;
  }

  /* FAMILY WRAPPER — walks across screen */
  .family-scene {
    position: absolute;
    bottom: 56px;
    left: -120px;
    display: flex;
    align-items: flex-end;
    gap: 6px;
    animation: familyWalkAcross 16s linear forwards;
  }
  @keyframes familyWalkAcross {
    0%   { left: -120px; }
    8%   { left: 80px; }   /* pause at house door */
    18%  { left: 80px; }   /* still at house */
    100% { left: calc(100% + 20px); }
  }

  /* PERSON BASE */
  .person {
    display: flex;
    flex-direction: column;
    align-items: center;
    image-rendering: pixelated;
    animation: personBob 0.4s steps(2) infinite;
  }
  @keyframes personBob {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-3px); }
  }

  /* HEAD */
  .p-head {
    width: 16px; height: 14px;
    background: #f4c88a;
    border: 2px solid #c8935a;
    position: relative;
  }
  /* HAIR */
  .p-hair {
    position: absolute;
    top: -4px; left: -1px;
    width: 18px; height: 6px;
    background: #3a2010;
  }
  .p-hair.blonde { background: #c9a84c; }
  .p-hair.dark   { background: #1a0f08; }
  .p-hair.bun {
    top: -4px; left: 2px;
    width: 12px; height: 4px;
    background: #5c3a1e;
    border-radius: 3px 3px 0 0;
  }
  /* EYES */
  .p-eyes {
    position: absolute;
    top: 4px; left: 2px;
    width: 12px; height: 2px;
    background: transparent;
  }
  .p-eyes::before, .p-eyes::after {
    content: '';
    position: absolute;
    top: 0;
    width: 3px; height: 3px;
    background: #1a0f08;
    border-radius: 50%;
  }
  .p-eyes::before { left: 1px; }
  .p-eyes::after  { right: 1px; }

  /* BODY */
  .p-body {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.2);
    position: relative;
  }
  /* Collar line */
  .p-body::after {
    content: '';
    position: absolute;
    top: 2px; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 2px;
    background: rgba(255,255,255,0.2);
  }

  /* ARMS */
  .p-arms {
    position: absolute;
    top: 2px;
    width: 26px; height: 8px;
    left: -4px;
  }
  .p-arm {
    position: absolute;
    top: 0;
    width: 4px; height: 12px;
    background: inherit;
    border: 1px solid rgba(0,0,0,0.2);
  }
  .p-arm.left  { left: 0;  transform-origin: top center; animation: armSwingL 0.4s steps(2) infinite; }
  .p-arm.right { right: 0; transform-origin: top center; animation: armSwingR 0.4s steps(2) infinite; }
  @keyframes armSwingL { 0%,100% { transform: rotate(10deg); } 50% { transform: rotate(-10deg); } }
  @keyframes armSwingR { 0%,100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }

  /* LEGS */
  .p-legs {
    display: flex;
    gap: 2px;
  }
  .p-leg {
    width: 7px; height: 12px;
    border: 2px solid rgba(0,0,0,0.2);
    transform-origin: top center;
  }
  .p-leg.left  { animation: legL 0.4s steps(2) infinite; }
  .p-leg.right { animation: legR 0.4s steps(2) infinite; }
  @keyframes legL { 0%,100% { transform: rotate(12deg); } 50% { transform: rotate(-12deg); } }
  @keyframes legR { 0%,100% { transform: rotate(-12deg); } 50% { transform: rotate(12deg); } }

  /* SHOES */
  .p-shoe {
    width: 9px; height: 4px;
    background: #1a1a2e;
    margin-top: -2px;
  }

  /* CHILD smaller */
  .person.child .p-head  { width: 13px; height: 11px; }
  .person.child .p-body  { width: 14px; height: 14px; }
  .person.child .p-leg   { width: 5px;  height: 9px; }
  .person.child .p-shoe  { width: 7px;  height: 3px; }
  .person.child .p-arms  { width: 20px; left: -3px; }
  .person.child .p-arm   { width: 3px; height: 9px; }

  /* LUGGAGE — on ground, attached to adult1 arm */
  .luggage-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 0;
    animation: luggageRoll 0.4s steps(2) infinite;
  }
  @keyframes luggageRoll {
    0%,100% { transform: rotate(0deg) translateY(0); }
    50%     { transform: rotate(1deg) translateY(-1px); }
  }
  .lg-handle {
    width: 10px; height: 7px;
    border: 2px solid var(--gold);
    border-bottom: none;
    border-radius: 2px 2px 0 0;
  }
  .lg-body {
    width: 22px; height: 18px;
    background: var(--gold);
    border: 2px solid #8b7230;
    position: relative;
  }
  .lg-body::before {
    content: '';
    position: absolute;
    top: 50%; left: 2px; right: 2px;
    height: 2px;
    background: rgba(0,0,0,0.2);
    transform: translateY(-50%);
  }
  .lg-body::after {
    content: '';
    position: absolute;
    top: 3px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 8px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  .lg-wheels {
    display: flex;
    justify-content: space-between;
    width: 20px;
    margin-top: 1px;
  }
  .lg-wheel {
    width: 6px; height: 5px;
    background: #333;
    border-radius: 0 0 3px 3px;
    animation: wheelSpin 0.3s linear infinite;
  }
  @keyframes wheelSpin {
    from { border-radius: 0 0 3px 3px; }
    to   { border-radius: 3px 0 0 3px; }
  }

  /* Small red luggage for child */
  .luggage-wrap.small .lg-handle { width: 7px; height: 5px; border-color: #e05555; }
  .luggage-wrap.small .lg-body   { width: 16px; height: 13px; background: #e05555; border-color: #8b2020; }
  .luggage-wrap.small .lg-wheels { width: 14px; }
  .luggage-wrap.small .lg-wheel  { width: 4px; height: 4px; }

  /* PROGRESS */
  .progress-section {
    width: 100%;
    background: #0d1020;
    border: 1px solid rgba(201,168,76,0.15);
    border-top: none;
    border-radius: 0 0 4px 4px;
    padding: 28px 32px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .dest-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: rgba(255,255,255,0.12);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .dest-display span { color: rgba(201,168,76,0.5); }

  .step-dots {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sdot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    transition: all 0.4s;
  }
  .sdot.active { background: var(--gold); box-shadow: 0 0 8px rgba(201,168,76,0.6); transform: scale(1.2); }
  .sdot.done   { background: rgba(201,168,76,0.35); }
  .sline { width: 24px; height: 1px; background: rgba(255,255,255,0.08); }

  .pbar-wrap {
    width: 100%;
    max-width: 420px;
    height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
  }
  .pbar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 1s ease;
  }

  .ptext {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    letter-spacing: 0.03em;
    min-height: 18px;
    transition: opacity 0.3s;
  }
  .ptext strong { color: var(--gold); font-weight: 500; }
</style>
</head>
<body>

<div class="logo">Global <span>Explore</span></div>

<div class="scene-wrap">
  <div class="canvas">
    <div class="sky-bg"></div>
    <div class="stars" id="stars"></div>
    <div class="moon"></div>

    <!-- PIXEL PLANE -->
    <div class="plane">
      <svg width="52" height="22" viewBox="0 0 52 22" fill="none" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
        <rect x="6"  y="8"  width="36" height="6"  fill="#c9a84c"/>
        <rect x="38" y="5"  width="10" height="11" fill="#c9a84c"/>
        <rect x="44" y="4"  width="8"  height="2"  fill="#e8d5a3"/>
        <rect x="44" y="15" width="6"  height="2"  fill="#e8d5a3"/>
        <rect x="0"  y="10" width="8"  height="2"  fill="#c9a84c"/>
        <rect x="10" y="3"  width="18" height="5"  fill="#e8d5a3"/>
        <rect x="12" y="14" width="12" height="4"  fill="#e8d5a3"/>
        <rect x="42" y="9"  width="2"  height="4"  fill="#f8f5ef"/>
        <rect x="4"  y="9"  width="4"  height="4"  fill="#e8d5a3"/>
      </svg>
    </div>

    <!-- HOUSES (left side) -->
    <!-- House 1 (family comes from here) -->
    <div class="house" style="left:30px;">
      <svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
        <!-- Roof -->
        <polygon points="5,40 45,5 85,40" fill="#c9a84c"/>
        <polygon points="5,40 45,5 85,40" fill="none" stroke="#8b7230" stroke-width="2"/>
        <!-- Chimney -->
        <rect x="58" y="10" width="10" height="20" fill="#8b4c2c"/>
        <rect x="56" y="8"  width="14" height="4"  fill="#a05a34"/>
        <!-- Smoke -->
        <circle cx="63" cy="4"  r="3" fill="rgba(255,255,255,0.15)"/>
        <circle cx="65" cy="0"  r="2" fill="rgba(255,255,255,0.1)"/>
        <!-- Walls -->
        <rect x="10" y="38" width="70" height="50" fill="#e8d5a3"/>
        <rect x="10" y="38" width="70" height="50" fill="none" stroke="#8b7230" stroke-width="2"/>
        <!-- Door -->
        <rect x="35" y="62" width="20" height="26" fill="#8b4c2c"/>
        <rect x="35" y="62" width="20" height="26" fill="none" stroke="#5c3218" stroke-width="1"/>
        <circle cx="51" cy="75" r="2" fill="#c9a84c"/>
        <!-- Windows -->
        <rect x="14" y="48" width="18" height="14" fill="#a8d4f0" stroke="#8b7230" stroke-width="1"/>
        <line x1="23" y1="48" x2="23" y2="62" stroke="#8b7230" stroke-width="1"/>
        <line x1="14" y1="55" x2="32" y2="55" stroke="#8b7230" stroke-width="1"/>
        <rect x="58" y="48" width="18" height="14" fill="#a8d4f0" stroke="#8b7230" stroke-width="1"/>
        <line x1="67" y1="48" x2="67" y2="62" stroke="#8b7230" stroke-width="1"/>
        <line x1="58" y1="55" x2="76" y2="55" stroke="#8b7230" stroke-width="1"/>
        <!-- Path from door -->
        <rect x="38" y="86" width="14" height="4" fill="#c9a84c" opacity="0.3"/>
      </svg>
    </div>

    <!-- House 2 (smaller, back) -->
    <div class="house" style="left:130px; bottom:62px;">
      <svg width="60" height="65" viewBox="0 0 60 65" fill="none" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
        <polygon points="2,28 30,4 58,28" fill="#8b7230"/>
        <rect x="6" y="26" width="48" height="38" fill="#d4c4a0"/>
        <rect x="6" y="26" width="48" height="38" fill="none" stroke="#8b7230" stroke-width="2"/>
        <rect x="22" y="42" width="16" height="22" fill="#6b3a20"/>
        <rect x="8"  y="32" width="14" height="10" fill="#a8d4f0" stroke="#8b7230" stroke-width="1"/>
        <rect x="38" y="32" width="14" height="10" fill="#a8d4f0" stroke="#8b7230" stroke-width="1"/>
      </svg>
    </div>

    <!-- House 3 (right, city transition) -->
    <div class="house" style="right:20px; bottom:56px;">
      <svg width="50" height="80" viewBox="0 0 50 80" fill="none" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
        <!-- Apartment building -->
        <rect x="2" y="10" width="46" height="70" fill="#2a3a5c"/>
        <rect x="2" y="10" width="46" height="70" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
        <!-- Windows grid -->
        <rect x="6"  y="15" width="8" height="6" fill="#f0e068" opacity="0.9"/>
        <rect x="18" y="15" width="8" height="6" fill="#a8d4f0" opacity="0.7"/>
        <rect x="30" y="15" width="8" height="6" fill="#f0e068" opacity="0.9"/>
        <rect x="6"  y="27" width="8" height="6" fill="#a8d4f0" opacity="0.7"/>
        <rect x="18" y="27" width="8" height="6" fill="#f0e068" opacity="0.9"/>
        <rect x="30" y="27" width="8" height="6" fill="#f0e068" opacity="0.5"/>
        <rect x="6"  y="39" width="8" height="6" fill="#f0e068" opacity="0.8"/>
        <rect x="18" y="39" width="8" height="6" fill="#a8d4f0" opacity="0.7"/>
        <rect x="30" y="39" width="8" height="6" fill="#f0e068" opacity="0.9"/>
        <rect x="6"  y="51" width="8" height="6" fill="#a8d4f0" opacity="0.6"/>
        <rect x="18" y="51" width="8" height="6" fill="#f0e068" opacity="0.8"/>
        <rect x="30" y="51" width="8" height="6" fill="#a8d4f0" opacity="0.7"/>
        <!-- Door -->
        <rect x="18" y="66" width="14" height="14" fill="#1a2a3c"/>
        <!-- Roof details -->
        <rect x="0" y="6" width="50" height="6" fill="#1a2a3c"/>
        <rect x="20" y="0" width="10" height="8" fill="#c9a84c"/>
      </svg>
    </div>

    <!-- GRASS & GROUND -->
    <div class="grass"></div>
    <div class="ground-strip">
      <div class="road-marks" id="roadMarks"></div>
    </div>

    <!-- FAMILY WALKING -->
    <div class="family-scene" id="family">

      <!-- ADULT 1 (dad, leads) -->
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div class="person" style="animation-delay:0s;">
          <div class="p-head">
            <div class="p-hair dark"></div>
            <div class="p-eyes"></div>
          </div>
          <div class="p-body" style="background:#2c5f8a;">
            <div class="p-arms">
              <div class="p-arm left"  style="background:#2c5f8a;"></div>
              <div class="p-arm right" style="background:#2c5f8a;"></div>
            </div>
          </div>
          <div class="p-legs">
            <div class="p-leg left"  style="background:#1a3a5c;"></div>
            <div class="p-leg right" style="background:#1a3a5c;"></div>
          </div>
          <div style="display:flex;gap:2px;">
            <div class="p-shoe"></div>
            <div class="p-shoe"></div>
          </div>
        </div>
      </div>

      <!-- LARGE GOLD LUGGAGE -->
      <div class="luggage-wrap" style="margin-bottom:16px;">
        <div class="lg-handle"></div>
        <div class="lg-body"></div>
        <div class="lg-wheels">
          <div class="lg-wheel"></div>
          <div class="lg-wheel"></div>
        </div>
      </div>

      <!-- ADULT 2 (mum) -->
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div class="person" style="animation-delay:0.1s;">
          <div class="p-head">
            <div class="p-hair bun"></div>
            <div class="p-eyes"></div>
          </div>
          <div class="p-body" style="background:#8b3a7a;">
            <div class="p-arms">
              <div class="p-arm left"  style="background:#8b3a7a;"></div>
              <div class="p-arm right" style="background:#8b3a7a;"></div>
            </div>
          </div>
          <div class="p-legs">
            <div class="p-leg left"  style="background:#5c1a4c;"></div>
            <div class="p-leg right" style="background:#5c1a4c;"></div>
          </div>
          <div style="display:flex;gap:2px;">
            <div class="p-shoe" style="background:#4a1a3a;"></div>
            <div class="p-shoe" style="background:#4a1a3a;"></div>
          </div>
        </div>
      </div>

      <!-- CHILD -->
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div class="person child" style="animation-delay:0.2s;">
          <div class="p-head">
            <div class="p-hair blonde"></div>
            <div class="p-eyes"></div>
          </div>
          <div class="p-body" style="background:#e05555;">
            <div class="p-arms">
              <div class="p-arm left"  style="background:#e05555;"></div>
              <div class="p-arm right" style="background:#e05555;"></div>
            </div>
          </div>
          <div class="p-legs">
            <div class="p-leg left"  style="background:#2c3e6b;"></div>
            <div class="p-leg right" style="background:#2c3e6b;"></div>
          </div>
          <div style="display:flex;gap:2px;">
            <div class="p-shoe" style="width:7px;height:3px;"></div>
            <div class="p-shoe" style="width:7px;height:3px;"></div>
          </div>
        </div>
      </div>

      <!-- SMALL RED LUGGAGE -->
      <div class="luggage-wrap small" style="margin-bottom:12px;">
        <div class="lg-handle"></div>
        <div class="lg-body"></div>
        <div class="lg-wheels">
          <div class="lg-wheel"></div>
          <div class="lg-wheel"></div>
        </div>
      </div>

    </div><!-- end family-scene -->

  </div><!-- end canvas -->

  <!-- PROGRESS -->
  <div class="progress-section">
    <div class="dest-display">
      <span id="destDisplay">—</span>
    </div>

    <div class="step-dots">
      <div class="sdot active" id="s0"></div>
      <div class="sline"></div>
      <div class="sdot" id="s1"></div>
      <div class="sline"></div>
      <div class="sdot" id="s2"></div>
      <div class="sline"></div>
      <div class="sdot" id="s3"></div>
    </div>

    <div class="pbar-wrap">
      <div class="pbar" id="pbar"></div>
    </div>

    <div class="ptext" id="ptext">
      <strong>Searching</strong> 500+ airlines for the best fares…
    </div>
  </div>
</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const lang    = params.get('lang') || 'en';
  const dest    = params.get('dest') || '';

  if (dest) document.getElementById('destDisplay').innerHTML =
    '<span>' + dest + '</span>';

  // Stars
  const sc = document.getElementById('stars');
  for (let i = 0; i < 35; i++) {
    const s = document.createElement('div');
    const sz = Math.random() > 0.6 ? 3 : 2;
    s.style.cssText = `
      position:absolute;
      width:${sz}px;height:${sz}px;
      background:#c9a84c;
      top:${Math.random()*70}%;
      left:${Math.random()*100}%;
      animation:twinkle ${1.5+Math.random()*2}s ${Math.random()*2}s infinite;
      border-radius:0;
    `;
    sc.appendChild(s);
  }
  const style = document.createElement('style');
  style.textContent = `
    @keyframes twinkle {
      0%,100%{opacity:1}50%{opacity:0.15}
    }
  `;
  document.head.appendChild(style);

  // Road marks
  const rm = document.getElementById('roadMarks');
  for (let i = 0; i < 10; i++) {
    const m = document.createElement('div');
    m.className = 'road-mark';
    m.style.animationDelay = i * 0.1 + 's';
    rm.appendChild(m);
  }

  // Progress steps
  const steps = {
    en: [
      { html: '<strong>Searching</strong> 500+ airlines for the best fares…',    pct: 15 },
      { html: '<strong>Finding</strong> the cheapest dates in your 7-day window…', pct: 38 },
      { html: '<strong>Searching</strong> hotels and local activities…',           pct: 62 },
      { html: '<strong>Building</strong> your personalised day-by-day itinerary…', pct: 85 },
      { html: 'Almost ready — <strong>finalising your plan…</strong>',             pct: 96 },
    ],
    zh: [
      { html: '正在搜索 <strong>500+</strong> 家航空公司的最优票价…',  pct: 15 },
      { html: '正在查找 <strong>7天内</strong> 最便宜的出行日期…',      pct: 38 },
      { html: '正在搜索 <strong>酒店</strong> 和当地活动…',             pct: 62 },
      { html: '正在为你生成 <strong>个性化每日行程</strong>…',          pct: 85 },
      { html: '即将完成 — <strong>正在整理你的行程方案…</strong>',      pct: 96 },
    ]
  };

  const cur  = steps[lang] || steps.en;
  const pbar = document.getElementById('pbar');
  const ptxt = document.getElementById('ptext');
  const dots = [0,1,2,3].map(i => document.getElementById('s'+i));

  function setStep(i) {
    const s = cur[Math.min(i, cur.length-1)];
    pbar.style.width = s.pct + '%';
    ptxt.style.opacity = '0';
    setTimeout(() => { ptxt.innerHTML = s.html; ptxt.style.opacity = '1'; }, 300);
    dots.forEach((d,j) => {
      d.className = 'sdot' + (j < i ? ' done' : j === i ? ' active' : '');
    });
  }

  setStep(0);
  [2000, 5000, 9500, 14000].forEach((t,i) => setTimeout(() => setStep(i+1), t));


  // ── FETCH ITINERARY WITH STREAMING ──
  async function fetchItinerary() {
    const raw = localStorage.getItem('ge_formData');
    if (!raw) {
      localStorage.setItem('ge_results', JSON.stringify({ error: 'no data' }));
      return;
    }

    const formData = JSON.parse(raw);
    const originCode = formData.origin?.match(/\(([A-Z]{3})\)/)?.[1] || formData.origin?.slice(0,3).toUpperCase() || 'MEL';
    const destCode   = formData.destination?.match(/\(([A-Z]{3})\)/)?.[1] || formData.destination?.slice(0,3).toUpperCase() || 'TYO';

    let flightsData = null;

    // 1. Fetch flights (fast, normal JSON)
    try {
      const flightsRes = await fetch('/api/flights', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          origin:      originCode,
          destination: destCode,
          date:        formData.departDate,
          adults:      formData.adults      || 1,
          children:    formData.children    || 0,
          infants:     formData.infants     || 0,
          travelClass: formData.travelClass || 'Economy',
          currency:    formData.currency    || 'AUD'
        })
      });
      flightsData = await flightsRes.json();
    } catch(err) {
      console.warn('Flights fetch error:', err.message);
      flightsData = { error: err.message };
    }

    // 2. Fetch itinerary with SSE streaming
    try {
      const itineraryRes = await fetch('/api/itinerary', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });

      if (!itineraryRes.ok) {
        throw new Error('Itinerary API returned ' + itineraryRes.status);
      }

      const reader  = itineraryRes.body.getReader();
      const decoder = new TextDecoder();
      let buffer    = '';
      let itineraryData = null;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        // Try to find complete data lines
        const lines = buffer.split('\n');
        // Keep last potentially incomplete line in buffer
        buffer = lines.pop() || '';

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.startsWith('data:')) continue;
          // Handle both 'data: {' and 'data:{' formats
          const jsonStr = trimmed.replace(/^data:\s*/, '').trim();
          if (!jsonStr || jsonStr === '[DONE]') continue;
          try {
            const parsed = JSON.parse(jsonStr);
            if (parsed.success && parsed.itinerary) {
              itineraryData = parsed;
              console.log('Itinerary received!');
            } else if (parsed.error) {
              throw new Error(parsed.error);
            }
          } catch(e) {
            if (e.message && !e.message.includes('JSON')) {
              throw e; // Re-throw non-JSON errors
            }
            // Ignore partial JSON parse errors
          }
        }
      }

      // Also try parsing any remaining buffer content
      if (!itineraryData && buffer.trim()) {
        const trimmed = buffer.trim();
        if (trimmed.startsWith('data:')) {
          try {
            const jsonStr = trimmed.replace(/^data:\s*/, '').trim();
            const parsed = JSON.parse(jsonStr);
            if (parsed.success && parsed.itinerary) {
              itineraryData = parsed;
            }
          } catch(_) {}
        }
      }

      if (!itineraryData) {
        throw new Error('No itinerary data received from stream');
      }

      // Store complete results
      localStorage.setItem('ge_results', JSON.stringify({
        flights:   flightsData,
        itinerary: itineraryData.itinerary
      }));

    } catch(err) {
      console.error('Itinerary stream error:', err.message);
      localStorage.setItem('ge_results', JSON.stringify({ error: err.message }));
    }
  }

  // Start immediately
  fetchItinerary();

  // Poll for results
  const poll = setInterval(() => {
    if (localStorage.getItem('ge_results')) {
      clearInterval(poll);
      pbar.style.width = '100%';
      ptxt.innerHTML = lang === 'zh' ? '完成！正在跳转…' : 'Done! Redirecting…';
      dots.forEach(d => d.className = 'sdot done');
      setTimeout(() => { window.location.href = '/results.html?lang=' + lang; }, 700);
    }
  }, 500);

  setTimeout(() => {
    if (!localStorage.getItem('ge_results'))
      localStorage.setItem('ge_results', JSON.stringify({error:'timeout'}));
  }, 300000);
</script>
</body>
</html>
